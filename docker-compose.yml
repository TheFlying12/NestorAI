services:
  cloud:
    build:
      context: ./cloud_service
    container_name: nestor-cloud
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CLOUD_SECRET_KEY: ${CLOUD_SECRET_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL}
      FERNET_KEY: ${FERNET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      CONTEXT_WINDOW_TURNS: ${CONTEXT_WINDOW_TURNS:-12}
      SUMMARY_UPDATE_EVERY_TURNS: ${SUMMARY_UPDATE_EVERY_TURNS:-6}
      ENABLE_CONTEXT_SUMMARY: ${ENABLE_CONTEXT_SUMMARY:-true}
      MESSAGE_RETENTION_DAYS: ${MESSAGE_RETENTION_DAYS:-90}
      SKILL_BUDGETS: ${SKILL_BUDGETS:-{}}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AUTO_MIGRATE: ${AUTO_MIGRATE:-false}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/health', timeout=5).raise_for_status()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
